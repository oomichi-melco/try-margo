name: Tests for pull requests

on:
  pull_request:
    branches: [main]

jobs:
  setup-margo-tests:
    name: Setup margo Tests
    runs-on: ubuntu-24.04

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup margo sandbox wfm
        run: ./try-margo/margo-installer/setup_margo_sandobox_wfm.sh

      - name: Setup margo sandbox client
        run: ./try-margo/margo-installer/setup_margo_sandobox_client.sh

      - name: Verify margo sandbox
        run: ./try-margo/margo-installer/verify_margo_sandbox.sh

      - name: Verify edge-app works on margo sandbox
        run: ./try-margo/margo-installer/verify_edge_app_works_on_margo.sh

  build-tests:
    name: Run Build Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run helm chart test
        run: ./try-margo/plugfest202607/apps/edge-app/run_helm_chart_tests.sh

      - name: Build edge-app container image
        run: ./try-margo/plugfest202607/apps/edge-app/build_container_image.sh

      - name: Run tests
        run: ./try-margo/plugfest202607/apps/edge-app/run_tests.sh

  push-images:
    name: Push Container Images
    runs-on: ubuntu-latest
    needs: build-tests
    permissions:
      # イメージをプッシュする権限をGITHUB_TOKENに付与する
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      REGISTRY_TOKEN_NAME: ${{ github.actor }}
      REGISTRY_TOKEN_PASSWD: ${{ secrets.GITHUB_TOKEN }}
      IMAGE_TAG: develop
      MULTI_ARCH_BUILD: true

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build edge-app container image
        run: ./try-margo/plugfest202607/apps/edge-app/build_container_image.sh

      - name: Push container images
        run: ./try-margo/plugfest202607/apps/push_container_images.sh

      - name: Run compose test
        run: ./try-margo/plugfest202607/apps/edge-app/run_compose_tests.sh

  push-helm-chart:
    name: Push helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0' # 任意のHelmバージョン

      - name: Install oras
        run: |
          VERSION="1.3.2"
          curl -LO "https://github.com/oras-project/oras/releases/download/v${VERSION}/oras_${VERSION}_linux_amd64.tar.gz"
          mkdir -p oras-install/
          tar -zxf oras_${VERSION}_*.tar.gz -C oras-install/
          sudo mv oras-install/oras /usr/local/bin/

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and Push Helm Chart
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          cd try-margo/plugfest202607/apps/edge-app/helm-chart
          helm package .
          ls
          helm push *.tgz oci://ghcr.io/$OWNER

      - name: Push application package
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          cd try-margo/plugfest202607/apps/edge-app/application-description/
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
          oras push ghcr.io/$OWNER/edge-app-helm-app-package:latest \
            --artifact-type "application/vnd.margo.app.v1+json" \
            margo.yaml:application/vnd.margo.app.description.v1+yaml

  k3s-tests:
    name: Test helm-chart on k3s
    runs-on: ubuntu-latest
    needs: push-images

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run k3s test
        run: ./try-margo/plugfest202607/apps/edge-app/run_k3s_tests.sh
