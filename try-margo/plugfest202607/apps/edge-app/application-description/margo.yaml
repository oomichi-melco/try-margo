apiVersion: margo.org/v1-alpha1
kind: ApplicationDescription
id: oomichi-melco-edge-app
metadata:
  name: edge app
  description: A basic edge app for plugfest
  version: "1.0"
  catalog:
    organization:
      - name: oomichi-melco
        site: https://github.com/oomichi-melco
deploymentProfiles:
  - type: helm
    id: oomichi-melco-edge-app-helm-a
    components:
      - name: edge-app
        properties:  
          repository: oci://ghcr.io/oomichi-melco/edge-app-chart
          revision: 1.0.0
          wait: true
  - type: compose
    id: oomichi-melco-edge-app-compose-a
    components:
      - name: edge-app-docker
        properties:
          packageLocation: https://raw.githubusercontent.com/oomichi-melco/try-margo/refs/heads/main/try-margo/plugfest202607/apps/edge-app/docker-compose/compose.yaml
parameters:
  greeting:
    value: harbor.machine:8443/edge-app
    targets:
    - pointer: image.repository
      components: ["edge-app"]
