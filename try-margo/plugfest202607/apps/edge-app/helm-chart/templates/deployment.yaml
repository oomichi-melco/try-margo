apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-edge-app
  labels:
    app: edge-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: edge-app
  template:
    metadata:
      labels:
        app: edge-app
    spec:
      containers:
        - name: main
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
